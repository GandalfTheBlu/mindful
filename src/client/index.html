<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mindful</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside id="sidebar">
    <div id="sidebar-header">
      <span class="app-name">mindful</span>
      <button id="btn-new">+</button>
    </div>
    <div id="user-bar">
      <span id="user-display" contenteditable="false" spellcheck="false" title="Click to switch user"></span>
      <ul id="user-dropdown" hidden></ul>
    </div>
    <ul id="session-list"></ul>
    <div id="sidebar-footer">
      <div id="google-auth-banner" hidden>
        <span id="google-auth-msg">Google auth expired</span>
        <button id="btn-google-reauth">Re-authenticate</button>
      </div>
      <button id="btn-search-memory">Search memory</button>
      <button id="btn-wipe-memory">Wipe memory</button>
    </div>
  </aside>

  <div id="memory-search-modal" class="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Search memory</span>
        <button id="btn-close-search">✕</button>
      </div>
      <div class="modal-body">
        <div class="search-controls">
          <input id="memory-search-input" type="text" placeholder="Search query…" autocomplete="off" />
          <input id="memory-search-limit" type="number" min="1" max="100" value="10" title="Max results (1–100)" />
          <button id="btn-run-search">Search</button>
        </div>
        <div id="memory-search-results"></div>
      </div>
    </div>
  </div>

  <main id="chat-area">
    <header id="chat-header">
      <h1 id="chat-title" contenteditable="false" spellcheck="false">Select or start a conversation</h1>
      <div id="header-actions">
        <button id="btn-tts" title="Toggle text-to-speech">&#128264;</button>
        <button id="btn-brief" disabled>Briefing</button>
        <button id="btn-save" disabled>Save</button>
      </div>
    </header>

    <div id="messages"></div>

    <form id="input-form">
      <textarea id="input" placeholder="Message…" rows="1" disabled></textarea>
      <button id="btn-send" type="submit" disabled>Send</button>
    </form>
  </main>

  <script src="app.js" type="module"></script>
</body>
</html>
